<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Forge3D WebGPU Terrain Hill Test</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #000;
      }

      canvas {
        display: block;
        width: 128px;
        height: 96px;
      }
    </style>
  </head>
  <body>
    <canvas id="forge3d-terrain-canvas" width="128" height="96"></canvas>
    <script type="module">
      import { Forge3DError, Forge3DRuntime } from "../src-ts/index.ts";

      const canvas = document.querySelector("#forge3d-terrain-canvas");

      function createHill(width, height) {
        const heights = new Float32Array(width * height);
        for (let y = 0; y < height; y += 1) {
          const v = y / (height - 1);
          for (let x = 0; x < width; x += 1) {
            const u = x / (width - 1);
            const dx = u - 0.5;
            const dy = v - 0.5;
            const distance = Math.sqrt(dx * dx + dy * dy);
            const hill = Math.max(0, 1 - distance * 2.2);
            heights[y * width + x] = hill * hill;
          }
        }
        return heights;
      }

      window.__forge3dTerrainProbe = async () => {
        if (!navigator.gpu) {
          return {
            supported: false,
            width: 0,
            height: 0,
            variedPixels: 0,
            lumaRange: 0,
            invalidCode: undefined
          };
        }

        const runtime = await Forge3DRuntime.create(canvas, {
          width: 128,
          height: 96,
          devicePixelRatio: 1,
          clearColor: [0.01, 0.01, 0.01, 1.0]
        });

        let invalidCode;
        try {
          runtime.setTerrain({
            width: 2,
            height: 2,
            heights: new Float32Array([0, 1, 0])
          });
        } catch (error) {
          invalidCode =
            error instanceof Forge3DError ? error.code : error?.code;
        }

        runtime.setTerrain({
          width: 33,
          height: 33,
          heights: createHill(33, 33)
        });
        runtime.render();

        await new Promise((resolve) => requestAnimationFrame(resolve));

        const width = canvas.width;
        const height = canvas.height;
        const probe = document.createElement("canvas");
        probe.width = width;
        probe.height = height;
        const context = probe.getContext("2d", { willReadFrequently: true });
        context.drawImage(canvas, 0, 0);
        const mapped = context.getImageData(0, 0, width, height).data;

        let minLuma = 255;
        let maxLuma = 0;
        let variedPixels = 0;
        for (let offset = 0; offset < mapped.length; offset += 4) {
          const r = mapped[offset];
          const g = mapped[offset + 1];
          const b = mapped[offset + 2];
          const luma = 0.2126 * r + 0.7152 * g + 0.0722 * b;
          if (r > 12 || g > 12 || b > 12) {
            variedPixels += 1;
            minLuma = Math.min(minLuma, luma);
            maxLuma = Math.max(maxLuma, luma);
          }
        }

        runtime.dispose();
        return {
          supported: true,
          width,
          height,
          variedPixels,
          lumaRange: maxLuma - minLuma,
          invalidCode
        };
      };
    </script>
  </body>
</html>
