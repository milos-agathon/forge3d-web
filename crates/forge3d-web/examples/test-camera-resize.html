<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Forge3D WebGPU Camera Resize Test</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #000;
      }

      canvas {
        display: block;
        width: 80px;
        height: 60px;
      }
    </style>
  </head>
  <body>
    <canvas id="forge3d-camera-resize-canvas" width="80" height="60"></canvas>
    <script type="module">
      import { Forge3DError, Forge3DRuntime } from "../src-ts/index.ts";

      const canvas = document.querySelector("#forge3d-camera-resize-canvas");

      function createRamp(width, height) {
        const heights = new Float32Array(width * height);
        for (let y = 0; y < height; y += 1) {
          const v = y / (height - 1);
          for (let x = 0; x < width; x += 1) {
            const u = x / (width - 1);
            heights[y * width + x] = Math.max(0, Math.min(1, u * 0.8 + v * 0.2));
          }
        }
        return heights;
      }

      async function sampleCanvas() {
        await new Promise((resolve) => requestAnimationFrame(resolve));

        const probe = document.createElement("canvas");
        probe.width = canvas.width;
        probe.height = canvas.height;
        const context = probe.getContext("2d", { willReadFrequently: true });
        context.drawImage(canvas, 0, 0);
        return context.getImageData(0, 0, probe.width, probe.height).data;
      }

      function pixelDifference(a, b) {
        const length = Math.min(a.length, b.length);
        let changed = 0;
        for (let offset = 0; offset < length; offset += 4) {
          const delta =
            Math.abs(a[offset] - b[offset]) +
            Math.abs(a[offset + 1] - b[offset + 1]) +
            Math.abs(a[offset + 2] - b[offset + 2]);
          if (delta > 35) {
            changed += 1;
          }
        }
        return changed;
      }

      window.__forge3dCameraResizeProbe = async () => {
        if (!navigator.gpu) {
          return {
            supported: false,
            width: 0,
            height: 0,
            resizedWidth: 0,
            resizedHeight: 0,
            invalidCode: undefined,
            changedPixels: 0
          };
        }

        const runtime = await Forge3DRuntime.create(canvas, {
          width: 80,
          height: 60,
          devicePixelRatio: 1,
          clearColor: [0.01, 0.01, 0.01, 1.0]
        });

        runtime.setTerrain({
          width: 25,
          height: 25,
          heights: createRamp(25, 25)
        });

        let invalidCode;
        try {
          runtime.setCamera({
            position: [0, 1, Number.NaN],
            target: [0, 0, 0],
            up: [0, 1, 0],
            fovYDegrees: 45,
            near: 0.01,
            far: 100
          });
        } catch (error) {
          invalidCode =
            error instanceof Forge3DError ? error.code : error?.code;
        }

        runtime.setCamera({
          position: [0, 1.3, 2.4],
          target: [0, 0.18, 0],
          up: [0, 1, 0],
          fovYDegrees: 46,
          near: 0.01,
          far: 100
        });
        runtime.render();
        const before = await sampleCanvas();

        runtime.resize({ width: 96, height: 72, devicePixelRatio: 2 });
        const resizedWidth = canvas.width;
        const resizedHeight = canvas.height;

        runtime.setCamera({
          position: [1.6, 1.0, 2.2],
          target: [0.2, 0.12, 0],
          up: [0, 1, 0],
          fovYDegrees: 46,
          near: 0.01,
          far: 100
        });
        runtime.render();
        const after = await sampleCanvas();

        const changedPixels = pixelDifference(before, after);
        const width = runtime.width;
        const height = runtime.height;
        runtime.dispose();

        return {
          supported: true,
          width,
          height,
          resizedWidth,
          resizedHeight,
          invalidCode,
          changedPixels
        };
      };
    </script>
  </body>
</html>
