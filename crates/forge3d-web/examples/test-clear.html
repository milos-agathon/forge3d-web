<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Forge3D WebGPU Clear Test</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #000;
      }

      canvas {
        display: block;
        width: 96px;
        height: 64px;
      }
    </style>
  </head>
  <body>
    <canvas id="forge3d-clear-canvas" width="96" height="64"></canvas>
    <script type="module">
      import { Forge3DRuntime } from "../src-ts/index.ts";

      const canvas = document.querySelector("#forge3d-clear-canvas");
      const clearColor = [0.2, 0.45, 0.8, 1.0];

      window.__forge3dClearProbe = async () => {
        if (!navigator.gpu) {
          return { supported: false, nonBlackPixels: 0 };
        }

        const runtime = await Forge3DRuntime.create(canvas, {
          width: 96,
          height: 64,
          devicePixelRatio: 1,
          clearColor
        });
        runtime.render();

        await new Promise((resolve) => requestAnimationFrame(resolve));

        const width = canvas.width;
        const height = canvas.height;
        const probe = document.createElement("canvas");
        probe.width = width;
        probe.height = height;
        const context = probe.getContext("2d", { willReadFrequently: true });
        context.drawImage(canvas, 0, 0);
        const mapped = context.getImageData(0, 0, width, height).data;
        const bytesPerPixel = 4;

        let nonBlackPixels = 0;
        for (let y = 0; y < height; y += 1) {
          const rowStart = y * width * bytesPerPixel;
          for (let x = 0; x < width; x += 1) {
            const offset = rowStart + x * bytesPerPixel;
            if (
              mapped[offset] > 8 ||
              mapped[offset + 1] > 8 ||
              mapped[offset + 2] > 8
            ) {
              nonBlackPixels += 1;
            }
          }
        }

        runtime.dispose();
        return {
          supported: true,
          width,
          height,
          nonBlackPixels
        };
      };
    </script>
  </body>
</html>
